<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Páginas Amarillas Digitales</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Encabezado / Navegación -->
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-book-bookmark logo-icon"></i>
            <span>Páginas<b>Amarillas</b>.digital</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a></li>
                <li><a href="servicios.html"><i class="fa-solid fa-list"></i> Directorio</a></li>
                <li><a href="perfil.html" class="active"><i class="fa-solid fa-user"></i> Mi Perfil</a></li>
                <li><button class="btn-logout" onclick="logoutPerfil()"><i class="fa-solid fa-power-off"></i>
                        Salir</button></li>
            </ul>
        </nav>
    </header>

    <!-- Banner Perfil -->
    <section class="profile-header">
        <div class="container profile-header-content">
            <div class="avatar-circle">
                <i class="fa-solid fa-user-gear"></i>
            </div>
            <div class="profile-title">
                <h1 id="userHeaderName">Cargando usuario...</h1>
                <p id="userHeaderRole" class="badge-role">Cargando rol...</p>
            </div>
        </div>
    </section>

    <!-- Contenido Principal -->
    <main class="container profile-container">
        <!-- Columna 1: Datos de la Cuenta -->
        <section class="profile-card">
            <h2><i class="fa-solid fa-id-card"></i> Datos del Perfil</h2>
            <form id="profileForm">
                <label>Nombre Completo / Empresa:</label>
                <input type="text" id="profName" required>

                <label>Correo Electrónico:</label>
                <input type="email" id="profEmail" required disabled>
                <small class="help-text">El email no se puede cambiar por seguridad.</small>

                <label>Tipo de Cuenta:</label>
                <input type="text" id="profType" disabled>

                <button type="submit" class="btn-submit"><i class="fa-solid fa-floppy-disk"></i> Guardar
                    Cambios</button>
            </form>
        </section>

        <!-- Columna 2: Publicaciones del Usuario (Mis Servicios) -->
        <section class="profile-card">
            <div class="my-services-header">
                <h2><i class="fa-solid fa-store"></i> Mis Publicaciones</h2>
                <a href="servicios.html" class="btn-add-mini"><i class="fa-solid fa-plus"></i> Publicar Nuevo</a>
            </div>
            <div id="myServicesList" class="my-services-list">
                <!-- Se cargan dinámicamente con JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Páginas Amarillas Digitales. Impulsando el comercio e independientes locales.</p>
    </footer>

    <script src="perfil.js"></script>
</body>

</html>
